<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CA.RO — Criar conta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared.css" /><link rel="stylesheet" href="auth.css" />
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="brand-mark">CR</div>
    <span class="auth-brand-name">GRUPO CA.RO</span>
  </div>
  <h1>Criar conta gratuita</h1>
  <p class="sub">14 dias grátis. Sem cartão de crédito. Cancele quando quiser.</p>

  <button class="social-btn">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-.99.66-2.25 1.05-3.71 1.05-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18A11 11 0 0 0 1 12c0 1.78.43 3.46 1.18 4.94l3.66-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52Z"/></svg>
    Continuar com Google
  </button>
  <div class="divider">ou</div>

  <form onsubmit="event.preventDefault(); window.location='onboarding.html'">
    <div class="field"><label>Seu nome completo</label><input required placeholder="Maria Silva" /></div>
    <div class="field"><label>E-mail corporativo</label><input type="email" required placeholder="maria@suaempresa.com.br" /></div>
    <div class="field"><label>Nome da empresa</label><input required placeholder="Sua Empresa Ltda" /></div>
    <div class="field-row">
      <div class="field"><label>CNPJ</label><input required placeholder="00.000.000/0001-00" /></div>
      <div class="field"><label>Telefone</label><input required placeholder="(11) 99999-9999" /></div>
    </div>
    <div class="field"><label>Crie uma senha</label><input type="password" required placeholder="Mínimo 8 caracteres" /></div>
    <div class="checkbox"><input type="checkbox" required id="t" /><label for="t" style="font-size:12px">Concordo com os <a href="../marketing/privacy.html" style="color:var(--accent)">Termos</a> e <a href="../marketing/privacy.html" style="color:var(--accent)">Política de Privacidade</a></label></div>
    <button class="auth-btn" type="submit">Criar conta gratuita →</button>
  </form>

  <div class="auth-foot">Já tem conta? <a href="login.html">Entrar</a></div>
</div>
</body>
</html>
