<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CARVION — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../shared.css" /><link rel="stylesheet" href="auth.css" />
</head>
<body>
<div class="auth-card">
  <div class="auth-brand">
    <div class="brand-mark">CV</div>
    <span class="auth-brand-name">CARVION</span>
  </div>
  <h1>Entrar na sua conta</h1>
  <p class="sub">Bem-vindo de volta. Acesse sua gestão empresarial.</p>

  <button class="social-btn">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-.99.66-2.25 1.05-3.71 1.05-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18A11 11 0 0 0 1 12c0 1.78.43 3.46 1.18 4.94l3.66-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52Z"/></svg>
    Continuar com Google
  </button>
  <div class="divider">ou</div>

  <form id="login-form">
    <div class="field"><label>E-mail ou login</label><input id="login-id" required placeholder="admin@carvion.com ou admin" /></div>
    <div class="field"><label>Senha</label><input id="login-password" type="password" required placeholder="••••••••" /></div>
    <div id="login-message" class="field-help"></div>
    <div class="checkbox"><input type="checkbox" id="rm" /><label for="rm">Manter conectado</label><span style="margin-left:auto"><a href="#" style="color:var(--accent);font-size:12.5px">Esqueci a senha</a></span></div>
    <button class="auth-btn" type="submit">Entrar →</button>
  </form>

  <button id="demo-button" class="auth-btn" type="button" style="margin-top:10px;background:linear-gradient(135deg,var(--accent),oklch(0.72 0.13 230));box-shadow:0 16px 34px var(--accent-soft);">DEMO</button>
  <div class="field-help" style="text-align:center;margin-top:8px">Recria os dados e entra como administrador para apresentação.</div>

  <div class="auth-foot">Não tem uma conta? <a href="signup.html">Criar conta gratuita</a></div>
</div>
<script src="../carvion-core.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const reason = params.get('reason');
  const message = document.getElementById('login-message');
  if (reason) message.textContent = `Sessão inválida: ${reason}. Faça login novamente.`;
  document.getElementById('demo-button').addEventListener('click', () => {
    const button = document.getElementById('demo-button');
    button.textContent = 'Preparando demo...';
    const result = Carvion.resetDemoData({ loginAdmin: true });
    if (!result.ok) {
      message.textContent = result.message || 'Não foi possível iniciar a demo.';
      button.textContent = 'DEMO';
      return;
    }
    location.href = '../dashboard';
  });

  document.getElementById('login-form').addEventListener('submit', (event) => {
    event.preventDefault();
    const button = event.currentTarget.querySelector('button');
    button.textContent = 'Validando...';
    const result = Carvion.login(
      document.getElementById('login-id').value,
      document.getElementById('login-password').value,
      document.getElementById('rm').checked
    );
    if (!result.ok) {
      message.textContent = result.message;
      button.textContent = 'Entrar →';
      return;
    }
    location.href = '../dashboard';
  });
</script>
</body>
</html>
