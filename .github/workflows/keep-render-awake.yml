name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping CARVION app
        run: |
          curl --fail --silent --show-error --max-time 60 --retry 2 --retry-delay 10 https://carvion.onrender.com/api/healthz
          curl --fail --silent --show-error --max-time 60 --retry 2 --retry-delay 10 https://carvion.onrender.com/version.json
