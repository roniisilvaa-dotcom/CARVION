services:
  - type: web
    name: carvion-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm install --prefix backend && npm run db:generate --prefix backend && npm run build --prefix backend
    startCommand: npm run start:full
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false

  - type: web
    name: carvion-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/analytics/industrial
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
