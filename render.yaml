services:
  - type: web
    name: carvion-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build:full
    preDeployCommand: npm run db:push --prefix backend
    startCommand: npm run start:full
    healthCheckPath: /api/sync/financeiro
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false

  - type: web
    name: carvion-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run db:generate && npm run build
    preDeployCommand: npm run db:push
    startCommand: npm start
    healthCheckPath: /api/analytics/industrial
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
